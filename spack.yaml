# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-om3]
  - _version: [2026.05.002]
  specs:
  - access-om3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@2026.03.002'
      - configurations=MOM6,MOM6-CICE6,MOM6-CICE6-WW3
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    access-cice:
      require:
      - '@CICE6.6.3-1'
      - io_type=PIO
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    access-mom6:
      require:
      - '@git.2610fdea91252e6742efe79e48dbf78d352df141=2026.05.001'  # On branch dev/gfdl+access+isf
      - +mom6_solo
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    access-ww3:
      require:
      - '@2026.03.000'
    access3-share:
      require:
      - '@2026.03.002'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    access-generic-tracers:
      require:
      - '@2026.05.000'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    access-mocsy:
      require:
      - '@2025.07.002'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    # Other Dependencies
    esmf:
      require:
      - '@8.9.1'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -traceback -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -fno-omit-frame-pointer -O3 -flto"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -fno-omit-frame-pointer -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
    parallelio:
      require:
      - '@2.6.8'
      - 'fflags="-g -traceback"'
      - 'cflags="-g -fno-omit-frame-pointer"'
      - 'cxxflags="-g -fno-omit-frame-pointer"'
    netcdf-c:
      require:
      - '@4.9.3'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.2'
    fms:
      require:
      - '@2025.03'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto"'
      - 'ldflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -O3 -flto -fuse-ld=lld"'
      - 'cppflags="-DMAXFIELDMETHODS_=600"'
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'
    python:
      require:
      - '@3.11.7'   # force spack to use the system python install
    # Compilers
    c:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    cxx:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    fortran:
      require:
      - 'intel-oneapi-compilers@2025.2.0'

    all:
      prefer:
      - 'target=x86_64_v4'
  view: true
  concretizer:
    unify: true
