# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in 
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  specs:
    - access-om3@git.2025.08.001
  packages:
    # Main Dependencies
    access3:
      require:
        - '@git.870d7a45d5f0fbad6241de1748b9533e603f9bd2'
        - configurations=MOM6-CICE6-UM13
        # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-cice:
      require:
        - '@git.f2ccc1c71ccc1f01d552d72e9f6a7e4085cc583c'
        - io_type=PIO
        - driver=access/cmeps
        # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-mom6:
      require:
        - '@2025.02.000'
        # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access3-share:
      require:
        - '@git.870d7a45d5f0fbad6241de1748b9533e603f9bd2'
        # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    # Other Dependencies
    esmf:
      require:
        - '@8.7.0'
        # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
        # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    parallelio:
      require:
        - '@2.6.2'
    netcdf-c:
      require:
        - '@4.9.2'
        - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
        - '@4.6.1'
    fms:
      require:
        - '@git.2024.03'
        # - 'cppflags="-DMAXFIELDMETHODS_=600"'
    openmpi:
      require:
        - '@4.1.7'
    fortranxml:
      require:
        - '@4.1.2'
    gcc-runtime:
      require:
        - '%gcc'
    gcom:
      require:
       - '@8.0'
    all:
      require:
        - '%intel@2021.10.0'
        - 'target=x86_64'
  concretizer:
    unify: true


  modules:
    prefix_inspections:
      bin:
       - PATH
      lib:
       - LIBRARY_PATH
       - LD_LIBRARY_PATH
      lib64:
       - LIBRARY_PATH
       - LD_LIBRARY_PATH
      include:
       - FPATH

    default:
      tcl:
        include:
          - access-om3
          - access-mom6
          - access-cice
          - access3-share
          - esmf
          - fms
          - parallelio
          - fortranxml
          - gcom
          - openmpi
          - netcdf-c
          - netcdf-fortran