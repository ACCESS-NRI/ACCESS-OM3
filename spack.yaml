# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in 
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  definitions:
    - _name: [ access-om3 ]
    - _version: [ 2025.08.999 ]
  specs:
    - access-om3
    # - gcom@8.0
  packages:
    # Main Dependencies
    access3:
      require:
        - '@git.74d7aa725f8f142dbe07ec375173cd727fecdc79=stable'
        - configurations=MOM6-CICE6
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    access-cice:
      require:
        - '@git.e16ef83961f89d82212d9b69692b4ff022584777=stable'
        - io_type=PIO
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    access-mom6:
      require:
        - '@2025.07.000'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    access3-share:
      require:
        - '@git.74d7aa725f8f142dbe07ec375173cd727fecdc79=stable'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    access-generic-tracers:
      require:
        - '@2025.08.000'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    access-mocsy:
      require:
        - '@2025.07.002'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    # Other Dependencies
    esmf:
      require:
        - '@8.7.0'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    parallelio:
      require:
        - '@2.6.2'
        - 'fflags="-g -00 -traceback"'
        - 'cflags="-g -00 -traceback"'
        - 'cxxflags="-g -00 -traceback"'
    netcdf-c:
      require:
        - '@4.9.2'
        - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
        - '@4.6.1'
    fms:
      require:
        - '@2025.03'
        - 'cppflags="-DMAXFIELDMETHODS_=600"'
    openmpi:
      require:
        - '@4.1.7'
    fortranxml:
      require:
        - '@4.1.2'
    gcc-runtime:
      require:
        - '%gcc'
    c:
      require:
        - 'intel-oneapi-compilers-classic@2021.10.0'
    cxx:
      require:
        - 'intel-oneapi-compilers-classic@2021.10.0'
    fortran:
      require:
         - 'intel-oneapi-compilers-classic@2021.10.0'
    all:
      prefer:
        - 'target=x86_64'
  view: true
  concretizer:
    unify: true
  modules:
      prefix_inspections:
        bin:
         - PATH
        lib:
         - LIBRARY_PATH
         - LD_LIBRARY_PATH
        lib64:
         - LIBRARY_PATH
         - LD_LIBRARY_PATH
        include:
         - FPATH

      default:
        tcl:
          include:
          - access-om3
          - access-cice
          - access-generic-tracers
          - access-mocsy
          - access-mom6
          - access3
          - access3-share
          - esmf
          - fms
          - fortranxml
          # - gcom
          - netcdf-c
          - netcdf-fortran
          - openmpi
          - parallelio
          projections:
            access-om3: '{name}/2025.08.999/2025.x.0'
            access-cice: '{name}/access-cm3-CICE6.6.1-0-{hash:7}'
            access-generic-tracers: '{name}/2025.08.000-{hash:7}'
            access-mocsy: '{name}/2025.07.002-{hash:7}'
            access-mom6: '{name}/cmake_build-{hash:7}'
            access3: '{name}/33c3e2791df4e048aff49359b61718084dc14cdf-{hash:7}'
            access3-share: '{name}/access-cm3-2025.12.0-{hash:7}'
            esmf: '{name}/v8.7.0-{hash:7}'
            fms: '{name}/2024.03-{hash:7}'
            fortranxml: '{name}/4.1.2-{hash:7}'
            gcom: '{name}/8.0-{hash:7}'
            netcdf-c: '{name}/4.9.2-{hash:7}'
            netcdf-fortran: '{name}/4.6.1-{hash:7}'
            parallelio: '{name}/2.6.2-{hash:7}'
