# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-om3]
  - _version: [2025.08.001]
  specs:
  - access-om3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@2025.08.000'
      - configurations=MOM6-CICE6
      # - 'fflags="-march=x86-64-v4 -mtune=generic -unroll"'
      # - 'cflags="-march=x86-64-v4 -mtune=generic -unroll"'
      # - 'cxxflags="-march=x86-64-v4 -mtune=generic -unroll"'
    access-cice:
      require:
      - '@CICE6.6.1-0'
      - io_type=PIO
      # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-mom6:
      require:
      - '@2025.07.000'
      # - 'fflags="-march=x86-64-v4 -mtune=generic -unroll"'
      # - 'cflags="-march=x86-64-v4 -mtune=generic -unroll"'
      # - 'cxxflags="-march=x86-64-v4 -mtune=generic -unroll"'
    access-ww3:
      require:
      - '@2025.08.000'
    access3-share:
      require:
      - '@2025.08.000'
      # - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      # - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      # - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-generic-tracers:
      require:
      - '@2025.08.000'
      - 'fflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
      - 'cflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
      - 'cxxflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
    access-mocsy:
      require:
      - '@2025.07.002'
      - 'fflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
      - 'cflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
      - 'cxxflags="-xCORE-AVX2 -march=sapphirerapids -mtune=sapphirerapids -unroll -xCORE-AVX2"'
    # Other Dependencies
    esmf:
      require:
      - '@8.7.0'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -grecord-gcc-switches"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    parallelio:
      require:
      - '@2.6.8'
    netcdf-c:
      require:
      - '@4.9.3'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.1'
    fms:
      require:
      - '@2025.03'
      - 'cppflags="-DMAXFIELDMETHODS_=600"'
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'
    snappy:
      require:
       - '@1.1.10'
    hdf5:
      require:
      - '@1.14.3'
    m4:
      require:
      - '@1.4.19'
    cmake:
      require:
      - '@3.24.2'
    libaec:
      require:
      - '@1.0.6'
    gcc-runtime:
      require:
      - '@14.2.0'
      
    # Compilers
    c:
      prefer:
      - 'intel-oneapi-compilers@2025.2.0'
    cxx:
      prefer:
      - 'intel-oneapi-compilers@2025.2.0'
    fortran:
      prefer:
      - 'intel-oneapi-compilers@2025.2.0'

    all:
      prefer:
      - 'target=x86_64_v4'
  view: true
  concretizer:
    unify: true
