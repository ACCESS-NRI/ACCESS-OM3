# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-om3]
  - _version: [2026.03.000]
  specs:
  - access-om3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@git.c84afe16ad90688574f310ae723ba1f3337dbaa9=2026.03.000'
      - configurations=MOM6,MOM6-CICE6,MOM6-CICE6-WW3,WW3,MOM6-WW3
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-cice:
      require:
      - '@CICE6.6.3-0'
      - io_type=PIO
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-mom6:
      require:
      - '@2026.05.000'
      - +mom6_solo
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-ww3:
      require:
      - '@git.b53c06c30e50e6401a329f21d6f7f189259647f2=2026.03.000'
    access3-share:
      require:
      - '@git.c84afe16ad90688574f310ae723ba1f3337dbaa9=2026.03.000'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-generic-tracers:
      require:
      - '@2026.02.001'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    access-mocsy:
      require:
      - '@2025.07.002'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"'
    # Other Dependencies
    esmf:
      require:
      - '@8.9.1'
      - 'fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -traceback"'
      - 'cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -traceback"'
      - 'cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -traceback"'
    parallelio:
      require:
      - '@2.6.8'
      - 'fflags="-g -traceback"'
      - 'cflags="-g -fno-omit-frame-pointer"'
      - 'cxxflags="-g -fno-omit-frame-pointer"'
    netcdf-c:
      require:
      - '@4.9.3'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.2'
    fms:
      require:
      - '@2025.03'
      - 'cppflags="-DMAXFIELDMETHODS_=600"'
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'

    # Compilers
    c:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    cxx:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    fortran:
      require:
      - 'intel-oneapi-compilers@2025.2.0'

    all:
      prefer:
      - 'target=x86_64_v4'
  view: true
  concretizer:
    unify: true
